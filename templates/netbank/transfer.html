{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

    <h3>Secure NetBank Transfer</h3>

    <div class="card shadow p-4 mt-3">

        <h5>Available Balance: ₹ {{ account.balance }}</h5>

        <form method="POST" action="{{ url_for('netbank.transfer_money') }}">

            <div class="mb-3">
                <input type="text"
                       name="receiver_account"
                       placeholder="Receiver Account Number"
                       class="form-control" required>
            </div>

            <div class="mb-3">
                <input type="number"
                       name="amount"
                       placeholder="Amount"
                       class="form-control" required>
            </div>

            <div class="mb-3">
                <input type="text"
                       name="note"
                       placeholder="Note"
                       class="form-control">
            </div>

            <button type="submit"
                    class="btn btn-primary w-100">
                Transfer Money
            </button>

        </form>

    </div>

</div>

{% endblock %}
