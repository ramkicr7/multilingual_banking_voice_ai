{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
<div class="col-md-4">
<div class="card p-4 shadow">

<form method="POST">

        <label>Enter OTP</label>
        <input type="text" name="otp" class="form-control" required>

</form>

</div>
</div>
</div>

{% endblock %}
